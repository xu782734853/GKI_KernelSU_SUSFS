name: 内核构建 - Android 16 (6.12)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernelsu_variant:
        description: "KernelSU 变体"
        required: true
        type: choice
        options:
          - Official
          #- Next
          - SukiSU
          - SukiSU(40726)
          - SukiSU(40548)
          - ReSukiSU
        default: ReSukiSU
      version:
        description: "自定义版本名 (可选)"
        required: false
        type: string
      build_time:
        description: "自定义构建时间 (可选，N或留空=当前UTC)"
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      use_kpm:
        description: "KPM 功能（patched 尚不支持）"
        required: true
        type: choice
        default: "disabled (关闭)"
        options:
          - "disabled (关闭)"
          - "enabled (开启)"
          - "patched (开启并修补，尚不支持)"
      droidspaces:
        description: "Droidspaces 容器支持"
        required: false
        type: choice
        options:
          - "off"
          - "on"
        default: "off"
      artifact_upload_mode:
        description: "构建产物上传模式"
        required: true
        type: choice
        options:
          - "仅上传 AnyKernel3.zip"
          - "上传全部"
        default: "仅上传 AnyKernel3.zip"
      droidspaces_ntsync:
        description: "启用 Droidspaces 容器 NTSync 支持（需启用 Droidspaces）"
        required: false
        type: boolean
        default: false
      use_zram:
        description: "启用 ZRAM 增强算法"
        required: true
        type: boolean
        default: false
      use_bbg:
        description: "启用 BBG 防格机"
        required: true
        type: boolean
        default: false
      use_rekernel:
        description: "启用 Re-Kernel 驱动"
        required: false
        type: boolean
        default: false
      cancel_susfs:
        description: "禁用 SUSFS"
        required: true
        type: boolean
        default: false
      supp_op:
        description: "启用一加 8E 支持"
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      kernelsu_variant:
        required: true
        type: string
      version:
        required: false
        type: string
      build_time:
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      use_zram:
        required: true
        type: boolean
      use_bbg:
        required: true
        type: boolean
      use_kpm:
        required: true
        type: string
      use_rekernel:
        required: false
        type: boolean
        default: false
      cancel_susfs:
        required: false
        type: boolean
      supp_op:
        required: false
        type: boolean
      droidspaces:
        required: false
        type: string
        default: "off"
      artifact_upload_mode:
        required: false
        type: string
        default: "上传全部"
      droidspaces_ntsync:
        required: false
        type: boolean
        default: false
      called_from_main:
        description: "是否从 main.yml 调用（内部使用）"
        required: false
        type: boolean
        default: false

jobs:
  # 1. 前置准备任务：读取、去重并解析 6.12.json
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read and Parse 6.12.json Matrix
        id: set-matrix
        run: |
          MATRIX_JSON=$(jq -c '
            [
              ( .entries | map({ sub_level: (.kernel | split(".") | .[2]), os_patch_level: .date }) | unique_by(.sub_level)[] ),
              { sub_level: (.lts | split(".") | .[2]), os_patch_level: "lts" }
            ]
          ' ./data/android16/6.12.json)
          
          echo "matrix=${MATRIX_JSON}" >> $GITHUB_OUTPUT

  # 2. 动态生成的内核编译主任务
  build-kernels-a16-6-12:
    needs: prepare-matrix
    name: "6.12.${{ matrix.sub_level }}-${{ matrix.os_patch_level }}"
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs['prepare-matrix'].outputs.matrix) }}
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: "android16"
      kernel_version: "6.12"
      sub_level: ${{ matrix.sub_level }}
      os_patch_level: ${{ matrix.os_patch_level }}
      ksu_variant: ${{ inputs.kernelsu_variant }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: false
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel || false }}
      supp_op: ${{ inputs.supp_op || false }}
      enable_susfs: ${{ !inputs.cancel_susfs }}
      droidspaces: ${{ inputs.droidspaces || 'off' }}
      droidspaces_ntsync: ${{ inputs.droidspaces_ntsync || false }}
      artifact_upload_mode: ${{ inputs.artifact_upload_mode }}

  # 3. 仅在直接触发时运行，从 main.yml 调用时跳过
  get-ksu-manager:
    if: ${{ !inputs.called_from_main }}
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}

```
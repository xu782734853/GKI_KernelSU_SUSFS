name: 内核构建 - Android 16 (6.12)

# 适配 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      # KernelSU 变体固定为 ReSukiSU
      kernelsu_branch:
        description: "KSU 分支 (main/builtin/自定义commit hash，留空使用默认)"
        required: false
        type: string
        default: ""
      version:
        description: "自定义版本名 (可选)"
        required: false
        type: string
      build_time:
        description: "自定义构建时间 (可选，N或留空=当前UTC)"
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      use_zram:
        description: "启用 ZRAM 增强算法"
        required: true
        type: boolean
        default: false
      use_bbg:
        description: "启用 BBG 防格机"
        required: true
        type: boolean
        default: false
      use_rekernel:
        description: "启用 Re-Kernel 驱动"
        required: false
        type: boolean
        default: false
      cancel_susfs:
        description: "禁用 SUSFS"
        required: true
        type: boolean
        default: false
      supp_op:
        description: "启用一加 8E 支持"
        required: false
        type: boolean
        default: false
      droidspaces:
        description: "Droidspaces 容器支持"
        required: false
        type: choice
        options:
          - "off"
          - "on"
        default: "off"
  workflow_call:
    inputs:
      # KernelSU 变体固定为 ReSukiSU
      kernelsu_branch:
        required: true
        type: string
      version:
        required: false
        type: string
      build_time:
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      use_zram:
        required: true
        type: boolean
      use_bbg:
        required: true
        type: boolean
      use_rekernel:
        required: false
        type: boolean
        default: false
      cancel_susfs:
        required: false
        type: boolean
      supp_op:
        required: false
        type: boolean
      droidspaces:
        required: false
        type: string
        default: "off"
      called_from_main:
        description: "是否从 main.yml 调用（内部使用）"
        required: false
        type: boolean
        default: false

jobs:
  build-kernels-a16-6-12:
    name: "6.12.${{ matrix.sub_level }}-${{ matrix.os_patch_level }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - sub_level: "23"
            os_patch_level: "2025-06"
          - sub_level: "30"
            os_patch_level: "2025-07"
          - sub_level: "38"
            os_patch_level: "2025-09"
          - sub_level: "58"
            os_patch_level: "2025-12"
          - sub_level: "X"
            os_patch_level: "lts"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: "android16"
      kernel_version: "6.12"
      sub_level: ${{ matrix.sub_level }}
      os_patch_level: ${{ matrix.os_patch_level }}
      ksu_variant: "ReSukiSU"
      ksu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: false
      use_bbg: ${{ inputs.use_bbg }}
      use_rekernel: ${{ inputs.use_rekernel || false }}
      supp_op: ${{ inputs.supp_op || false }}
      enable_susfs: ${{ !inputs.cancel_susfs }}
      droidspaces: ${{ inputs.droidspaces || 'off' }}

  # 仅在直接触发时运行，从 main.yml 调用时跳过
  get-ksu-manager:
    if: ${{ !inputs.called_from_main }}
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
